  <h1>Why Clamp Force Matters</h1>

  <p>
    Most people focus on TIM type when optimizing thermal performance.
    But in real systems, clamp force has a much larger impact.
  </p>

  <p>
    Insufficient pressure leads to poor contact and increased thermal resistance.
    Excess pressure can damage components.
  </p>
